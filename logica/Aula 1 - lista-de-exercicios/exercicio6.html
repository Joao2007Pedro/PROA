<body>
     <h1>Exercício 6</h1>

    <h2>Enunciado:</h2>
        <h3>Desenvolva um algoritmo em Java que leia um número inteiro e imprima o seu
            antecessor e seu sucessor
        </h3>

        <script>
            let num = parseFloat(prompt("Digite um número: "));

            let antecessor = num - 1;
            let sucessor = num + 1;

            document.write("<br> O antecessor do número " + num + " é " + antecessor);
            document.write("<br> O sucessor do número " + num + " é " + sucessor);

        </script>
</body>
</html>
