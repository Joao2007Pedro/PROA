<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos condicionais usando JavaScript</title>
</head>
<body>

    <h1>Testando comandos de Switch/Case</h1>

    <script>
        let semaforo = prompt("Digite a cor do semáforo:").toLowerCase();
x
        switch (semaforo) {
            case "verde":
                alert("Pode passar!");
                break;
            case "amarelo":
                alert("Atenção! O semáforo vai ficar vermelho.");
                break;
            case "vermelho":
                alert("Pare! O semáforo está vermelho.");
                break;
            default:
                alert("Cor do semáforo inválida. Por favor, digite verde, amarelo ou vermelho.");
        }


    </script>
    
</body>
</html>
