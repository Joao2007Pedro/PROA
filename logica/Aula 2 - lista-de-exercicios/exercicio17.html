<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 17</title>
</head>
<body>

    <h1>Exercício 17</h1>

    <h2>Enunciado:</h2>
        <h3>17. Escreva um programa que leia a idade de 20 pessoas e exiba quantas pessoas são maiores
            de idade.  
        </h3>

    <script>
        let soma = 0;
        let maiores = 0;
        for (let i = 1; i <= 20; i++) {
            let idade = parseInt(prompt('Digite a idade da pessoa ' + i + ':'));
            soma += idade;
            if (idade >= 18) {
                maiores++;
            }
        }
        let media = soma / 20;
        document.write('A média das idades é: ' + media);
    </script>
</body>
</html>
