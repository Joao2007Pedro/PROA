<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 15</title>
</head>
<body>

    <h1>Exercício 15</h1>

    <h2>Enunciado:</h2>
        <h3>15. Escreva um programa que leia a idade de 20 pessoas e exiba a soma das idades. 
        </h3>

    <script>
        let soma = 0;
        for (let i = 1; i <= 20; i++) {
            let idade = parseInt(prompt('Digite a idade da pessoa ' + i + ':'));
            soma += idade;
        }
        document.write('A soma das idades é: ' + soma);
    </script>
</body>
</html>
