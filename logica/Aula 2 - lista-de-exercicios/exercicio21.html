<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 21</title>
</head>
<body>

    <h1>Exercício 21</h1>

    <h2>Enunciado:</h2>
        <h3>21. A Loja Mamão com Açúcar está vendendo seus produtos em 5 (cinco) prestações sem juros.
                Faça um programa que receba um valor de uma compra e mostre o valor das prestações.
        </h3>

        <script>

            let valorCompra = parseFloat(prompt('Digite o valor da compra:'));
            let valorPrestacao = valorCompra / 5;

            document.write('Valor de cada prestação: R$ ' + valorPrestacao.toFixed(2));

        </script>
    
</body>
</html>
