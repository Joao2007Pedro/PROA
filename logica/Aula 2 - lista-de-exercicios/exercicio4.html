<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>

    <h1>Exercício 4</h1>

    <h2>Enunciado:</h2>
        <h3>4. Dados três valores A, B e C, construa um programa em Javascript, que mostre na tela os
            valores de forma descendente (do maior para o menor).
        </h3>

        <script>
            let A = parseFloat(prompt('Digite o valor de A:'));
            let B = parseFloat(prompt('Digite o valor de B:'));
            let C = parseFloat(prompt('Digite o valor de C:'));

            function ordenarDescendente(a, b, c) {
                let numeros = [a, b, c];
                numeros.sort(function(x, y) {
                    return y - x; 
                });
                return numeros;
            }

            let numeros = ordenarDescendente(A, B, C);
            document.write('Valores em ordem descendente: ' + numeros.join(', '));
        </script>
    
</body>
</html>
