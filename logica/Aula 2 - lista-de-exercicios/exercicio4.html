<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>

    <h1>Exercício 4</h1>

    <h2>Enunciado:</h2>
        <h3>4. Dados três valores A, B e C, construa um programa em Javascript, que mostre na tela os
            valores de forma descendente (do maior para o menor).
        </h3>

        <script>
            let A = parseFloat(prompt('Digite o valor de A:'));
            let B = parseFloat(prompt('Digite o valor de B:'));
            let C = parseFloat(prompt('Digite o valor de C:'));

            if (A > B && A > C) { // A é o maior
                if (B > C) {
                    document.write("Valores : " + A + ", " + B + ", " + C);
                } else {
                    document.write("Valores : " + A + ", " + C + ", " + B);
                }
            } else if (B > A && B > C) { // B é o maior
                if (A > C) {
                    document.write("Valores : " + B + ", " + A + ", " + C);
                } else {
                    document.write("Valores : " + B + ", " + C + ", " + A);
                }
            } else { // C é o maior
                if (A > B) {
                    document.write("Valores : " + C + ", " + A + ", " + B); 
                } else {
                    document.write("Valores : " + C + ", " + B + ", " + A);
                }
            }

        </script>
    
</body>
</html>
