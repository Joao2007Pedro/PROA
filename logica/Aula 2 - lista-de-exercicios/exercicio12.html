    <h1>Exercício 12</h1>

    <h2>Enunciado:</h2>
        <h3>12.   Escreva um programa que calcule a soma dos números de 1 a 15. 
        </h3>

    <script>
        let soma = 0;
        for (let i = 1; i <= 15; i++) {
            soma += i;
        }
        document.write("A soma dos números de 1 a 15 é: " + soma);
    </script>
</body>
