<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>

    <h1>Exercício 14</h1>

    <h2>Enunciado:</h2>
        <h3>14. Escreva um programa que leia 10 números do usuário e calcule a soma desses números. 
        </h3>

    <script>
        let soma = 0;
        for (let i = 1; i <= 10; i++) {
            let numero = parseFloat(prompt('Digite o número ' + i + ':'));
            soma += numero;
        }
        document.write('A soma dos números digitados é: ' + soma);
    </script>
</body>
</html>
