<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <h1>Exercício 2</h1>

    <h2>Enunciado:</h2>
        <h3>2. Escreva um programa em Javascript, que leia um número e informe se ele é divisível por 10,
            por 5 ou por 2 ou se não é divisível por nenhum deles.
        </h3>
        
        <script>
            let numero = parseInt(prompt('Digite um número:'));
            let resultado = '';

            if (numero % 10 === 0) {
                resultado = 'O número é divisível por 10.';
            } else if (numero % 5 === 0) {
                resultado = 'O número é divisível por 5.';
            } else if (numero % 2 === 0) {
                resultado = 'O número é divisível por 2.';
            } else {
                resultado = 'O número não é divisível por 10, 5 ou 2.';
            }

            document.write(resultado);
        </script>
</body>
</html>
