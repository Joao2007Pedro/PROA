<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 22</title>
</head>
<body>

    <h1>Exercício 22</h1>

    <h2>Enunciado:</h2>
        <h3>22. Faça um programa que leia 20 números e, ao final, escreva quantos estão entre 0 e 100
        </h3>

        <script>
            let count = 0;

            for (let i = 0; i < 20; i++) {
                let num = parseFloat(prompt("Digite um número:"));
                if (num > 0 && num < 100) {
                    count++;
                }
            }

            alert("Quantidade de números entre 0 e 100: " + count);
        </script>
    
</body>
</html>
