<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 20</title>
</head>
<body>

    <h1>Exercício 20</h1>

    <h2>Enunciado:</h2>
        <h3>20. Escreva um programa que leia 20 números do usuário e exiba quantos números são maiores
            do que 8.
        </h3>

    <script>
        let contador = 0;

        for (let i = 0; i < 20; i++) {
            let numero = parseFloat(prompt('Digite o ' + (i + 1) + 'º número:'));

            if (numero > 8) {
                contador++;
            }
        }

        document.write('Quantidade de números maiores do que 8: ' + contador);
    </script>
</body>
</html>
