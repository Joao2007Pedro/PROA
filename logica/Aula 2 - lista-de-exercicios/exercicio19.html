<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 19</title>

<body>

    <h1>Exercício 19</h1>

    <h2>Enunciado:</h2>
        <h3>19. Elaborar um programa que efetue a apresentação do valor da conversão em real (R$) de um
            valor lido em dólar (US$). O programa deverá solicitar o valor da cotação do dólar e também a
            quantidade de dólares disponíveis com o usuário
        </h3>

    <script>
        let cotacaoDolar = parseFloat(prompt('Digite a cotação do dólar:'));
        let quantidadeDolar = parseFloat(prompt('Digite a quantidade de dólares que você tem:'));

        let valorEmReais = cotacaoDolar * quantidadeDolar;

        document.write('Valor em reais: R$ ' + valorEmReais.toFixed(2));
    </script>

</body>
</html>
