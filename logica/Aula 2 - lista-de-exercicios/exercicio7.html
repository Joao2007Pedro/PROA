<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>

    <h1>Exercício 7</h1>

    <h2>Enunciado:</h2>
        <h3>7.  Fazer um programa que mostre na tela a média aritmética dos números 8,9 e 7. A média dos
        números 4, 5 e 6. A soma das duas médias. A média das médias.

        </h3>
    
        <script>
            let media1 = (8 + 9 + 7) / 3;
            let media2 = (4 + 5 + 6) / 3;
            let somaMedias = media1 + media2;
            let mediaDasMedias = somaMedias / 2;

            document.write('Média dos números 8, 9 e 7: ' + media1.toFixed(2) + '<br>');
            document.write('Média dos números 4, 5 e 6: ' + media2.toFixed(2) + '<br>');
            document.write('Soma das duas médias: ' + somaMedias.toFixed(2) + '<br>');
            document.write('Média das médias: ' + mediaDasMedias.toFixed(2));
        </script>
</body>
</html>
