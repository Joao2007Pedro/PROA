<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>

    <h1>Exercício 10</h1>

    <h2>Enunciado:</h2>
        <h3>10.  Informar um saldo e mostrar na tela o saldo com reajuste de 1.5%.
        </h3>

    <script>
        let saldo = parseFloat(prompt("Digite o saldo:"));
        let saldoReajustado = saldo * 1.015;
        document.write("O saldo com reajuste é: " + saldoReajustado);
    </script>
</body>
</html>
