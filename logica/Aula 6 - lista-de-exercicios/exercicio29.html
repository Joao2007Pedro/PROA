<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 29</title>
</head>
<body>
    <h1>Exercicio 29</h1>
        <h2>Enunciado:</h2>
        <h3>29- Escreva um programa que calcule o fatorial de um número
            inteiro inserido pelo usuário usando o loop "do-while".</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro:"));
            let fatorial = 1;
            let i = 1;

            do {
                fatorial *= i;
                i++;
            } while (i <= numero);

            document.write("O fatorial de " + numero + " é: " + fatorial);
        </script>
    
</body>
</html>
