<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 25</title>
</head>
<body>
    <h1>Exercicio 25</h1>
        <h2>Enunciado:</h2>
        <h3>25- Faça um programa que exiba os primeiros 20 números da
            sequência de Fibonacci usando o loop "do-while".</h3>

        <script>
            let a = 0, b = 1, count = 1;

            document.write("Sequência de Fibonacci: " + a + ", " + b);

            do {
                let next = a + b;
                document.write(", " + next);
                a = b;
                b = next;
                count++;
            } while (count < 20);
        </script>
    
</body>
</html>
