<!DOCTYPE html>
<html lang="en">
<head>

    <title>Exercicio 3</title>

<body>
    <h1>Exercicio 3</h1>
        <h2>Enunciado:</h2>
        <h3>3- Crie um programa que exiba os números pares de 1 a 50 usando
            o loop "while".</h3>

        <script>
            let i = 2;
            while (i <= 50) {
                document.write(i + "<br>");
                i += 2          ;
            }
        </script>
    
</body>
</html>
