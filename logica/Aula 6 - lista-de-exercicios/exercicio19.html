<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 19</title>
</head>
<body>
    <h1>Exercicio 19</h1>
        <h2>Enunciado:</h2>
        <h3>19- Faça um programa que leia 5 números inteiros usando o loop
            "do-while" e exiba a média aritmética dos valores lidos.</h3>

        <script>
            let contador = 0;
            let soma = 0;

            do {
                let numero = parseInt(prompt("Digite um número inteiro:"));
                soma += numero;
                contador++;
            } while (contador < 5);

            let media = soma / 5;
            document.write("A média aritmética dos valores lidos é: " + media);
        </script>
    
</body>
</html>
