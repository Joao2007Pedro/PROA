<body>
    <h1>Exercicio 12</h1>
        <h2>Enunciado:</h2>
        <h3>12-  Crie um programa que exiba os números ímpares de 1 a 50
            usando o loop "while".</h3>

        <script>
            let i = 1;
            while (i <= 51) {
                document.write(i + "<br>");
                i += 2;
            }
        </script>

</body>
