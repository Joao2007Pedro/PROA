<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 28</title>
</head>
<body>
    <h1>Exercicio 28</h1>
        <h2>Enunciado:</h2>
        <h3>28- Faça um programa que leia um número inteiro e exiba os seus
            dígitos separadamente usando o loop "do-while".</h3>

        <script>
            let numero = prompt("Digite um número inteiro:");
            let i = 0;

            do {
                document.write(numero[i] + "<br>");
                i++;
            } while (i < numero.length);
        </script>
    
</body>
</html>
