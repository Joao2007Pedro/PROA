<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 33</title>
</head>
<body>
    <h1>Exercicio 33</h1>
        <h2>Enunciado: </h2>
        <h3>33 - Crie um programa que exiba os números pares de 1 a 50.</h3>

        <script>
            for (let i = 2; i <= 50; i += 2) {
                document.write(i + "<br>");
            }
        </script>
    
</body>
</html>
