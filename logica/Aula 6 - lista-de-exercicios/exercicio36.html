<body>
    <h1>Exercicio 36</h1>
        <h2>Enunciado: </h2>
        <h3>36 - Crie um programa que leia um número inteiro positivo e exiba
            todos os divisores desse número.</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro positivo:"));

            document.write("Divisores de " + numero + ":<br>");

            for (let i = 1; i <= numero; i++) {
                if (numero % i === 0) {
                    document.write(i + "<br>");
                }
            }
        </script>
        tabuada desse número até o décimo valor</h3>
    
</body>
</html>
