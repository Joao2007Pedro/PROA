<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio 1</h1>
        <h2>Enunciado:</h2>
        <h3>1- Faça um programa que exiba os números de 1 a 10 usando o
            loop "while".</h3>

        <script>
            let i = 1;
            while (i <= 10) {
                document.write(i + "<br>");
                i++;
            }
        </script>
    
</body>
</html>
