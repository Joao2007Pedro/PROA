<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Exercicio 6</h1>
        <h2>Enunciado:</h2>
        <h3>6- Crie um programa que leia um número inteiro positivo e exiba
            todos os divisores desse número usando o loop "while".</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro positivo: "));
            let i = 1;
            document.write("Divisores de " + numero + ":<br>");
            while (i <= numero) {
                if (numero % i === 0) {
                    document.write(i + "<br>");
                }
                i++;
            }
        </script>
    
</body>
</html>
