<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Exercicio 14</title>
</head>
<body>
    <h1>Exercicio 14</h1>
        <h2>Enunciado:</h2>
        <h3>14- Escreva um programa que calcule o fatorial de um número
            inteiro inserido pelo usuário usando o loop "while".</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro:"));
            let fatorial = 1;
            let i = 1;

            while (i <= numero) {
                fatorial *= i;
                i++;
            }

            document.write("O fatorial de " + numero + " é: " + fatorial);
        </script>
</body>
</html>
