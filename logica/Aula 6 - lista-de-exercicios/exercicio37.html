<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 37</title>
</head>
<body>
    <h1>Exercicio 37</h1>
        <h2>Enunciado: </h2>
        <h3>37 - Faça um programa que leia um número inteiro e exiba se ele é
            um número primo.</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro positivo:"));
            let ehPrimo = true;

            if (numero <= 1) {
                ehPrimo = false;
            } else {
                for (let i = 2; i <= Math.sqrt(numero); i++) {
                    if (numero % i === 0) {
                        ehPrimo = false;
                        break;
                    }
                }
            }

            if (ehPrimo) {
                document.write(numero + " é um número primo.");
            } else {
                document.write(numero + " não é um número primo.");
            }
        </script>
</body>
</html>
