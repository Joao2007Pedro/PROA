<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 13</title>
</head>
<body>
    <h1>Exercicio 13</h1>
        <h2>Enunciado:</h2>
        <h3>13- Faça um programa que leia um número inteiro e exiba os seus
            dígitos separadamente usando o loop "while".</h3>

        <script>
            let numero = prompt("Digite um número inteiro:");
            let i = 0;

            while (i < numero.length) {
                document.write(numero[i] + "<br>");
                i++;
            }
        </script>
    
</body>
</html>
