<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 44</title>
</head>
<body>
    <h1>Exercicio 44</h1>
        <h2>Enunciado: </h2>
        <h3>44 - Escreva um programa que calcule o fatorial de um número
            inteiro inserido pelo usuário.</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro para calcular o fatorial:"));
            let fatorial = 1;
            for (let i = 1; i <= numero; i++) {
                fatorial *= i;
            }
            document.write("O fatorial de " + numero + " é: " + fatorial);
        </script>
    
</body>
</html>
