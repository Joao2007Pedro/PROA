<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <h1>Exercicio 5</h1>
        <h2>Enunciado:</h2>
        <h3>5- Escreva um programa que leia um número inteiro e exiba a
                tabuada desse número até o décimo valor usando o loop "while"</h3>

        <script>
            let i = 1;
            let numero = parseInt(prompt("Digite um número inteiro: "));
            while (i <= 10) {
                document.write(numero + " x " + i + " = " + (numero * i) + "<br>");
                i++;
            }
        </script>
    
</body>
</html>
