<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 23</title>
</head>
<body>
    <h1>Exercicio 23</h1>
        <h2>Enunciado:</h2>
        <h3>23- Escreva um programa que leia um número inteiro e exiba a
            sequência de Fibonacci até o número lido usando o loop "do-while".</h3>
    
        <script>
            let numero = parseInt(prompt("Digite um número inteiro: "));
            let a = 0, b = 1, temp;

            document.write("Sequência de Fibonacci até " + numero + ":<br>");

            do {
                document.write(a + "<br>");
                temp = a;
                a = b;
                b = temp + b;
            } while (a <= numero);
        </script>
</body>
</html>
