<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 15</title>
</head>
<body>
    <h1>Exercicio 15</h1>
        <h2>Enunciado:</h2>
        <h3>15- Crie um programa que leia o nome e a idade de várias pessoas
        usando o loop "while" até que o nome "fim" seja informado. Ao final,
        exiba a média das idades.</h3>

        <script>
            let nome;
            let idade;
            let somaIdades = 0;
            let contador = 0;

            while (true) {
                nome = prompt("Digite o nome da pessoa (ou 'fim' para encerrar):");
                if (nome.toLowerCase() === "fim") {
                    break;
                }
                idade = parseInt(prompt("Digite a idade de " + nome + ":"));
                somaIdades += idade;
                contador++;
            }

            if (contador > 0) {
                let mediaIdades = somaIdades / contador;
                document.write("A média das idades é: " + mediaIdades.toFixed(2));
            } else {
                document.write("Nenhuma pessoa foi cadastrada.");
            }

        </script>
</body>
</html>
