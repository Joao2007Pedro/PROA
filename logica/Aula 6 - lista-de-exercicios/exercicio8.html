<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 8</title>
</head>
<body>
    <h1>Exercicio 8</h1>
        <h2>Enunciado:</h2>
        <h3>8-  Escreva um programa que leia um número inteiro e exiba a
            sequência de Fibonacci até o número lido usando o loop "while".</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro: "));
            let a = 0, b = 1, temp;

            document.write("Sequência de Fibonacci até " + numero + ":<br>");

            while (a <= numero) {
                document.write(a + "<br>");
                temp = a;
                a = b;
                b = temp + b;
            }
        </script>
    
</body>
</html>
