<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 42</title>
</head>
<body>
    <h1>Exercicio 42</h1>
        <h2>Enunciado: </h2>
        <h3>42 - Crie um programa que exiba os números ímpares de 50 a 1.</h3>

        <script>
            let numero = 50;
            document.write("Números ímpares de 50 a 1:<br>");
            for (let i = numero; i >= 1; i--) {
                if (i % 2 !== 0) {
                    document.write(i + "<br>");
                }
            }
        </script>
    
</body>
</html>
