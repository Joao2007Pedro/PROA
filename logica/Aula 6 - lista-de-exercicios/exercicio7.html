<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 7</title>
</head>
<body>
    <h1>Exercicio 7</h1>
        <h2>Enunciado:</h2>
        <h3>7-  Faça um programa que leia um número inteiro e exiba se ele é
            um número primo usando o loop "while".</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro: "));
            let i = 2;
            let primo = true;

            if (numero < 2) {
                primo = false;
            } else {
                while (i <= Math.sqrt(numero)) {
                    if (numero % i === 0) {
                        primo = false;
                        break;
                    }
                    i++;
                }
            }

            if (primo) {
                document.write(numero + " é um número primo.");
            } else {
                document.write(numero + " não é um número primo.");
            }
        </script>
</body>
</html>
