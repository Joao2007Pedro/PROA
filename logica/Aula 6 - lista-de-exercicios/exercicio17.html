<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body>
    <h1>Exercicio 17</h1>
        <h2>Enunciado:</h2>
        <h3>17- Escreva um programa que calcule a soma dos números de 1 a
            100 usando o loop "do-while".</h3>

        <script>
            let i = 1;
            let soma = 0;
            do {
                soma += i;
                i++;
            } while (i <= 100);
            document.write("A soma dos números de 1 a 100 é: " + soma);
        </script>
</body>
</html>
