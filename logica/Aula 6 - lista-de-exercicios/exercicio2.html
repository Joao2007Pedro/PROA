<body>
    <h1>Exercicio 2</h1>
        <h2>Enunciado:</h2>
        <h3>2- Escreva um programa que calcule a soma dos números de 1 a
            100 usando o loop "while".</h3>

        <script>
            let i = 1;
            let soma = 0;
            while (i <= 100) {
                soma += i;
                i++;
            }
            document.write("A soma dos números de 1 a 100 é: " + soma);
        </script>

</body>
