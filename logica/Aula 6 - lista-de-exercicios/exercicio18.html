<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 18</title>
</head>
<body>
    <h1>Exercicio 18</h1>
        <h2>Enunciado:</h2>
        <h3>18- Crie um programa que exiba os números pares de 1 a 50
            usando o loop "do-while".</h3>

        <script>
            let numero = 1;

            do {
                if (numero % 2 === 0) {
                    document.write(numero + "<br>");
                }
                numero++;
            } while (numero <= 50);
        </script>
</body>
</html>
