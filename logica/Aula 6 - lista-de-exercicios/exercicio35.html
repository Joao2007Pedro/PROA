<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 35</title>
</head>
<body>
    <h1>Exercicio 35</h1>
        <h2>Enunciado: </h2>
        <h3>35 - Escreva um programa que leia um número inteiro e exiba a
        tabuada desse número até o décimo valor</h3>

        <script>
            let numero = parseInt(prompt("Digite um número inteiro:"));

            document.write("Tabuada do " + numero + ":<br>");

            for (let i = 1; i <= 10; i++) {
                let resultado = numero * i;
                document.write(numero + " x " + i + " = " + resultado + "<br>");
            }
        </script>
</body>
</html>
