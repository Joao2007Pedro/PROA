<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 13</title>
</head>
<body>
    <h1>Faça um programa que leia 10 números inteiros e exiba quantos
        deles estão no intervalo de 10 a 50</h1>

    <script>
        let contadorIntervalo = 0;

        for (let i = 0; i < 10; i++) {
            let numero = parseInt(prompt("Digite um número inteiro:"));
            if (numero >= 10 && numero <= 50) {
                contadorIntervalo++;
            }
        }

        alert("Quantidade de números no intervalo de 10 a 50: " + contadorIntervalo);
    </script>
    
</body>
</html>
