<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 4</title>
</head>
<body>
    <h1>Faça um programa que leia 5 números inteiros e exiba quantos
        deles são pares.</h1>
    
        <script>
            let countPares = 0;

            for(let i = 0; i < 5; i++) {
                let numero = parseInt(prompt("Digite um número inteiro:"));

                if(numero % 2 === 0) {
                    countPares++;
                }
            }
            alert("Quantidade de números pares: " + countPares);
        </script>
</body>
</html>
