<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 3</title>
</head>
<body>
    <h1>Crie um programa que leia 7 números inteiros e exiba a média
        aritmética dos valores lidos.</h1>

    <script>
        let soma = 0;

        for (let i = 0; i < 7; i++) {
            let valor = parseInt(prompt("Digite um valor"))
            soma += valor
        }
        let resultado = soma/7;
        alert("Média: "+resultado)
    </script>
    
</body>
</html>
