<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <h1>Escreva um programa que leia 5 números inteiros e exiba o
        maior e o menor valor digitado.</h1>

    <script>
        let maior = Number.NEGATIVE_INFINITY;
        let menor = Number.POSITIVE_INFINITY;

        for (let i = 0; i < 5; i++) {
            let valor = parseInt(prompt("Digite um numero"))

            if (valor > maior) {
                maior = valor;
            }
            if (valor < menor) {
                menor = valor;
            }
        }

        alert("Maior: " + maior + "\nMenor: " + menor);
    </script>
</body>
</html>
