<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Faça um programa que leia 5 números inteiros e exiba-os na
    ordem inversa em que foram digitados.
    </h1>

    <script>
        for (let i = 5; i > 0; i--){
             let valor = parseInt(prompt("Digite um numero"))
             document.write(valor + "<br>")
        }
    </script>
    
</body>
</html>
