<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos usando JavaScript</title>
</head>
<body>
    <h1>
    Testando cálculos usando JavaScript
    </h1>

    <script>
        let num1 = prompt("Digite o primeiro número:");
        let num2 = prompt("Digite o segundo número:");  
        
        let soma = parseFloat(num1) + parseFloat(num2);
        let media = soma / 2;
        let subtracao = parseFloat(num1) - parseFloat(num2);
        let multiplicacao = parseFloat(num1) * parseFloat(num2);
        let divisao = parseFloat(num1) / parseFloat(num2);

        document.write("A soma de " + num1 + " e " + num2 + " é: " + soma);
        document.write("<br>A média de " + num1 + " e " + num2 + " é: " + media);
        document.write("<br>A subtração de " + num1 + " e " + num2 + " é: " + subtracao);
        document.write("<br>A multiplicação de " + num1 + " e " + num2 + " é: " + multiplicacao);
        document.write("<br>A divisão de " + num1 + " e " + num2 + " é: " + divisao);
        
    </script>
</body>
</html>
