<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos usando JavaScript</title>
</head>
<body>

    <h1>Testando cálculos usando JavaScript</h1>

    <script>
        let nota1 = parseFloat(prompt("Digite a primeira nota:"));
        let nota2 = parseFloat(prompt("Digite a segunda nota:"));
        let nota3 = parseFloat(prompt("Digite a terceira nota:"));
        let nota4 = parseFloat(prompt("Digite a quarta nota:"));

        let media = (nota1 + nota2 + nota3 + nota4) / 4;

        document.write("A 1ª nota é: " + nota1);
        document.write("<br>A 2ª nota é: " + nota2);
        document.write("<br>A 3ª nota é: " + nota3);
        document.write("<br>A 4ª nota é: " + nota4);
        document.write("<br>A média das notas é: " + media);
    </script>
    
</body>
</html>
