<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comando usando JavaScript</title>
</head>
<body>
    
    <h1>Testando comando usando JavaScript</h1>

    <script>
        let nome = "João"; // variável do tipo string (letras, números e caracteres especiais)
        let idade = 18; // variável do tipo int (Número inteiros podendo ser positivo ou negativo)
        let altura = 1.80; // variável do tipo float (Número decimais podendo ser positivo ou negativo)
        let estudante = true; // variável do tipo boolean (Verdadeiro ou falso)

        document.write("Olá, meu nome é " + nome);
        document.write("<br>Tenho " + idade + " anos");
        document.write("<br>Minha altura é " + altura + " metros");
        document.write("<br>Sou estudante? " + estudante);
        
    </script>

</body>
</html>
