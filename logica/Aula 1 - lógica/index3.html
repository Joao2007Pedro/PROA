<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando cálculos em JavaScript</title>
</head>
<body>

    <script>
        let num1 = 10;
        let num2 = 5;

        let soma = num1 + num2;
        let media = (num1 + num2) / 2;
        let subtracao = num1 - num2;
        let multiplicacao = num1 * num2;
        let divisao = num1 / num2;

        document.write("A soma de " + num1 + " e " + num2 + " é: " + soma);
        document.write("<br>A média de " + num1 + " e " + num2 + " é: " + media);
        document.write("<br>A subtração de " + num1 + " e " + num2 + " é: " + subtracao);
        document.write("<br>A multiplicação de " + num1 + " e " + num2 + " é: " + multiplicacao);
        document.write("<br>A divisão de " + num1 + " e " + num2 + " é: " + divisao);
    </script>
    
</body>
</html>
