<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos condicionais usando JavaScript</title>
</head>
<body>

    <h1> Comando condicionais usando IF - Else if - Else</h1>
    <script>
        
        let cor = prompt("Digite a cor: (Amarelo, Verde ou Vermelho)");

        if (cor == "Amarelo" || cor == "amarelo" || cor == "AMARELO") {
            alert("Atenção");
        } else if (cor == "Verde" || cor == "verde" || cor == "VERDE") {    
            alert("Siga");
        } else if (cor == "Vermelho" || cor == "vermelho" || cor == "VERMELHO") {
            alert("Pare");
        } else {
            alert("Cor inválida");
        }

    </script>

    
</body>
</html>
