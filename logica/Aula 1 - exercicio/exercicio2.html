<!DOCTYPE html>

<body>
    <h1>Exercício 2</h1>

    <h2>Enunciado:</h2>
        <h3>2. Fazer um programa que imprima a média aritmética dos números 8,9 e 7. A média dos
            números 4, 5 e 6. A soma das duas médias. A média das médias.
        </h3>

        <script>
            let media1 = (8 + 9 + 7) / 3;
            let media2 = (4 + 5 + 6) / 3;
            let somaMedias = media1 + media2;
            let mediaDasMedias = (media1 + media2) / 2;

            document.write(`Média 1: ${media1}<br>`);
            document.write(`Média 2: ${media2}<br>`);
            document.write(`Soma das médias: ${somaMedias}<br>`);
            document.write(`Média das médias: ${mediaDasMedias}<br>`);
        </script>

        </script>
</body>
</html>
