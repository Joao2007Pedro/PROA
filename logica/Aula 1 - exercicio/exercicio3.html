<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Exercício 3</h1>

    <h2>Enunciado:</h2>
        <h3>3. Informar um saldo e imprimir o saldo com reajuste de 1%.
        </h3>

        <script>
            let saldo = parseFloat(prompt("Digite o saldo:"));
            let saldoReajustado = saldo * 1.01; // Reajuste de 1%
            document.write("Saldo com reajuste de 1%: " + saldoReajustado);
        </script>
</body>
</html>
