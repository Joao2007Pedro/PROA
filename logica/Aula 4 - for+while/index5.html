<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comando Do While</title>
</head>
<body>
    <h1>Testando comando Do While</h1>

    <script>

        let numero = parseInt(prompt("Digite um número: "));    
        let i = 1;

        do {
            document.write(numero + " x " + i + " = " + (numero * i) + "<br>");
            i++;
        } while (i <= 10);

    </script>
    
</body>
</html>
