<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comando While</title>
</head>
<body>
    <h1>Testando comando While</h1>

    <script>
        let n = 1;
        
        while (n <= 100) {
            document.write("João Pedro<br>");
            n += 2;
        }

    </script>
</body>
</html>
